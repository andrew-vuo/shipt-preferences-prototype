<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Share your preferences — Shipt onboarding prototype</title>
<style>
  :root{
    --font: "Euclid Circular A", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font);
    background:#e9eaee;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;gap:14px;padding:24px 0;
  }

  /* wrapper that reserves the (scaled) device footprint on mobile */
  .viewport{position:relative;}

  /* ---- Phone frame ---- */
  .device{
    position:relative;
    width:375px;height:812px;
    background:#fff;border-radius:44px;
    box-shadow:0 0 0 12px #111, 0 24px 60px rgba(0,0,0,.35);
    overflow:hidden;
  }
  .screen{position:absolute;inset:0;overflow:hidden;}

  /* ---- Home screen ---- */
  #home{cursor:default;background:#fff;}
  #home img{display:block;}
  #home .home-header{position:absolute;top:0;left:0;width:375px;height:315px;z-index:3;}
  #home .home-tabbar{position:absolute;top:732px;left:0;width:375px;height:80px;z-index:3;}
  #home .home-scroll{
    position:absolute;top:315px;left:0;width:375px;height:417px;
    overflow-y:auto;overflow-x:hidden;z-index:1;-webkit-overflow-scrolling:touch;
  }
  #home .home-scroll img{width:375px;}
  .launch-hint{
    position:absolute;left:70px;top:353px;width:118px;height:36px;
    background:transparent;border:none;border-radius:400px;cursor:pointer;z-index:2;
  }

  /* ---- Exact Figma image screens (Step 1/2/3) ---- */
  .step-screen{position:absolute;inset:0;background:#fff;z-index:10;display:none;}
  .step-screen.active{display:block;animation:slideIn .28s cubic-bezier(.2,.7,.3,1);}
  @keyframes slideIn{from{transform:translateY(14px);opacity:0;}to{transform:none;opacity:1;}}
  .step-head-img{position:absolute;top:0;left:0;width:375px;height:88px;display:block;z-index:3;}
  .step-content{position:absolute;top:88px;left:0;width:375px;height:556px;
    overflow-y:auto;overflow-x:hidden;z-index:1;-webkit-overflow-scrolling:touch;}
  .content-inner{position:relative;width:375px;}
  .content-inner img{display:block;width:375px;}
  .step-foot-img{position:absolute;top:644px;left:0;width:375px;height:168px;display:block;z-index:3;}
  .nav-hotspots{position:absolute;inset:0;z-index:4;pointer-events:none;}
  .nav-hotspots .hotspot{pointer-events:auto;}
  .chip-hotspots{position:absolute;inset:0;}
  .hotspot{position:absolute;background:transparent;border:none;padding:0;margin:0;cursor:pointer;
    -webkit-tap-highlight-color:transparent;}
  .hotspot.chip{border-radius:400px;transition:background .1s;}
  .hotspot.chip.sel{border:2px solid #212121;background:rgba(33,33,33,.06);}
  .hotspot.chip:active{background:rgba(33,33,33,.10);}
  .hotspot.btn:active{background:rgba(255,255,255,.12);border-radius:400px;}

  /* ---- Toast (exact Figma component 735:185688) ---- */
  .toast{
    position:absolute;left:16px;top:665px;width:343px;
    background:#212121;border:1px solid rgba(33,33,33,0.1);
    border-radius:8px;overflow:clip;
    box-shadow:0 0 4px 0 rgba(0,0,0,.1), 0 6px 6px -4px rgba(0,0,0,.2);
    opacity:0;transform:translateY(12px);pointer-events:none;transition:.3s;z-index:20;
  }
  .toast.show{opacity:1;transform:none;pointer-events:auto;}
  .toast .toast-content{display:flex;gap:12px;align-items:center;padding:8px 12px;width:100%;}
  .toast .icon{width:20px;height:20px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .toast .icon svg{width:16.67px;height:16.67px;display:block;}
  .toast .txt{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:2px;align-items:flex-start;}
  .toast .txt .t1{font-family:var(--font);font-weight:600;font-size:16px;line-height:20px;color:#fff;}
  .toast .txt .t2{font-family:var(--font);font-weight:400;font-size:14px;line-height:18px;color:#fff;}
  .toast .close{width:20px;height:20px;flex:0 0 auto;color:#fff;background:transparent;border:none;padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .toast .close svg{width:14px;height:14px;display:block;}

  .caption{color:#6a6a72;font-size:13px;font-family:var(--font);text-align:center;max-width:375px;}
  .caption b{color:#333;}
  .reset{background:none;border:none;color:#1da457;font-weight:600;cursor:pointer;font-size:13px;font-family:var(--font);}

  /* ---- Mobile: fill the phone screen, drop desktop chrome ---- */
  @media (max-width:640px){
    body{padding:0;gap:0;background:#000;min-height:100dvh;justify-content:flex-start;}
    .caption{display:none;}
    #device{border-radius:0;box-shadow:none;}
  }
</style>
</head>
<body>

  <div class="viewport" id="viewport">
  <div class="device" id="device">

    <!-- HOME -->
    <section class="screen" id="home">
      <img class="home-header" src="assets/home-header.png" alt="" />
      <div class="home-scroll" id="homeScroll">
        <img id="homeContentImg" src="assets/home-content.png" alt="Home content" />
        <button class="launch-hint" id="launchHint" aria-label="Set preferences" onclick="openFlow()"></button>
      </div>
      <img class="home-tabbar" src="assets/home-tabbar.png" alt="" />
    </section>

    <!-- STEP 1/2/3 : exact Figma image exports + interactive hotspots -->
    <section class="step-screen" id="step">
      <img class="step-head-img" id="stepHead" src="assets/s1-head.png" alt="" />
      <div class="step-content" id="stepContent">
        <div class="content-inner" id="contentInner">
          <img id="stepContentImg" src="assets/s1-content.png" alt="" />
          <div class="chip-hotspots" id="chipHotspots"></div>
        </div>
      </div>
      <img class="step-foot-img" id="stepFoot" src="assets/s1-foot.png" alt="" />
      <div class="nav-hotspots" id="navHotspots"></div>
    </section>

    <!-- TOAST (exact Figma component) -->
    <div class="toast" id="toast">
      <div class="toast-content">
        <span class="icon">
          <svg viewBox="0 0 16.6667 16.6667" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M8.33333 16.6667C12.9357 16.6667 16.6667 12.9357 16.6667 8.33333C16.6667 3.73096 12.9357 0 8.33333 0C3.73096 0 0 3.73096 0 8.33333C0 12.9357 3.73096 16.6667 8.33333 16.6667ZM12.8406 6.72976C13.1823 6.38805 13.1823 5.83403 12.8406 5.49232C12.4989 5.15062 11.9449 5.15062 11.6032 5.49232L7.22188 9.87361L5.61838 8.2701C5.27667 7.92839 4.72265 7.92839 4.38094 8.2701C4.03923 8.61181 4.03923 9.16583 4.38094 9.50754L6.60316 11.7298C6.94487 12.0715 7.49889 12.0715 7.8406 11.7298L12.8406 6.72976Z" fill="#2FAD32"/></svg>
        </span>
        <span class="txt">
          <span class="t1">Preferences saved</span>
          <span class="t2">Changes can be made in your Account page</span>
        </span>
        <button class="close" aria-label="Dismiss" onclick="hideToast()">
          <svg viewBox="0 0 20 20" fill="none"><path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>
  </div>

  <div class="caption">
    Exact Shipt <b>“Share your preferences”</b> screens from Figma. &nbsp;·&nbsp;
    <button class="reset" onclick="goHome()">Reset to home</button>
  </div>

<script>
  // Exact Figma screens (375x812) with chip geometry captured from the design.
  const STEPS = [
    { head:"assets/s1-head.png", content:"assets/s1-content.png", foot:"assets/s1-foot.png", chips:[
      {label:"Myself",x:16,y:240,w:78,h:32},
      {label:"Partner",x:102,y:240,w:83,h:32},
      {label:"Family",x:193,y:240,w:76,h:32},
      {label:"Roommates",x:16,y:280,w:113,h:32},
      {label:"Business",x:137,y:280,w:91,h:32}
    ]},
    { head:"assets/s2-head.png", content:"assets/s2-content.png", foot:"assets/s2-foot.png", chips:[
      {label:"Groceries",x:16,y:270,w:98,h:32},
      {label:"Alcohol",x:122,y:270,w:83,h:32},
      {label:"Baby",x:213,y:270,w:66,h:32},
      {label:"Pet",x:287,y:270,w:55,h:32},
      {label:"Gifts & Party",x:16,y:310,w:119,h:32},
      {label:"Beauty",x:143,y:310,w:80,h:32},
      {label:"Home Decor",x:231,y:310,w:115,h:32},
      {label:"Personal Care",x:16,y:350,w:127,h:32},
      {label:"Household Essentials",x:151,y:350,w:175,h:32}
    ]},
    { head:"assets/s3-head.png", content:"assets/s3-content.png", foot:"assets/s3-foot.png", chips:[
      {label:"AHA Heart Healthy",x:16,y:270,w:162,h:32},
      {label:"Gluten Free",x:186,y:270,w:110,h:32},
      {label:"Low sodium",x:16,y:310,w:111,h:32},
      {label:"No Added Sugar",x:135,y:310,w:141,h:32},
      {label:"Non-GMO",x:16,y:350,w:101,h:32},
      {label:"Organic",x:125,y:350,w:87,h:32},
      {label:"Soy-free",x:220,y:350,w:90,h:32},
      {label:"Sugar-free",x:16,y:390,w:105,h:32},
      {label:"Wheat-free",x:129,y:390,w:110,h:32},
      {label:"Whole Grain",x:16,y:430,w:120,h:32},
      {label:"Atkins",x:139,y:430,w:75,h:32},
      {label:"Keto",x:222,y:430,w:64,h:32},
      {label:"Kosher",x:16,y:470,w:79,h:32},
      {label:"Mediterranean",x:103,y:470,w:133,h:32},
      {label:"Paleo",x:244,y:470,w:69,h:32},
      {label:"Pescatarian",x:16,y:510,w:113,h:32},
      {label:"Vegan",x:137,y:510,w:75,h:32},
      {label:"Vegetarian",x:220,y:510,w:107,h:32}
    ]}
  ];

  // shared header/footer hotspots (identical layout across steps)
  const NAV = {
    back:   {x:8,   y:48,  w:40,  h:40},
    close:  {x:323, y:44,  w:44,  h:44},
    primary:{x:16,  y:668, w:343, h:52},
    skip:   {x:16,  y:728, w:343, h:52}
  };

  const selected = [new Set(), new Set(), new Set()];
  let current = 0; // 1..3

  function openFlow(){ goStep(1); }

  function setHomeState(done){
    const img = document.getElementById('homeContentImg');
    const hint = document.getElementById('launchHint');
    const scroll = document.getElementById('homeScroll');
    img.src = done ? 'assets/done-content.png' : 'assets/home-content.png';
    hint.style.display = done ? 'none' : 'block';
    scroll.scrollTop = 0;
  }

  function goHome(){
    document.getElementById('step').classList.remove('active');
    hideToast();
    setHomeState(false);
    current = 0;
  }

  function mkHotspot(rect, cls, onClick, aria){
    const b = document.createElement('button');
    b.className = 'hotspot ' + cls;
    b.style.left = rect.x + 'px';
    b.style.top = rect.y + 'px';
    b.style.width = rect.w + 'px';
    b.style.height = rect.h + 'px';
    if(aria) b.setAttribute('aria-label', aria);
    b.onclick = onClick;
    return b;
  }

  function goStep(n){
    current = n;
    const s = STEPS[n-1];
    document.getElementById('stepHead').src = s.head;
    document.getElementById('stepContentImg').src = s.content;
    document.getElementById('stepFoot').src = s.foot;
    document.getElementById('stepContent').scrollTop = 0;

    // fixed nav (header + footer), screen coordinates
    const nav = document.getElementById('navHotspots');
    nav.innerHTML = '';
    nav.appendChild(mkHotspot(NAV.back, 'btn', ()=> n<=1 ? goHome() : goStep(n-1), 'Back'));
    nav.appendChild(mkHotspot(NAV.close, 'btn', goHome, 'Close'));
    nav.appendChild(mkHotspot(NAV.primary, 'btn', stepNext, n<3?'Continue':'Finish'));
    nav.appendChild(mkHotspot(NAV.skip, 'btn', stepNext, 'Skip'));

    // chips live inside the scrollable content (coords are content-relative: frameY - 88)
    const wrap = document.getElementById('chipHotspots');
    wrap.innerHTML = '';
    s.chips.forEach(c=>{
      const rect = {x:c.x, y:c.y - 88, w:c.w, h:c.h};
      const h = mkHotspot(rect, 'chip', null, c.label);
      if(selected[n-1].has(c.label)) h.classList.add('sel');
      h.onclick = ()=>{
        if(selected[n-1].has(c.label)){ selected[n-1].delete(c.label); h.classList.remove('sel'); }
        else { selected[n-1].add(c.label); h.classList.add('sel'); }
      };
      wrap.appendChild(h);
    });

    document.getElementById('step').classList.add('active');
  }

  function stepNext(){
    if(current < 3){ goStep(current + 1); }
    else { finishFlow(); }
  }

  function finishFlow(){
    document.getElementById('step').classList.remove('active');
    setHomeState(true);
    current = 0;
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(hideToast, 4000);
  }

  function hideToast(){
    document.getElementById('toast').classList.remove('show');
  }

  /* ---- Mobile: scale the 375x812 device to fit the phone viewport ---- */
  function fitDevice(){
    const device = document.getElementById('device');
    const vp = document.getElementById('viewport');
    const mobile = window.matchMedia('(max-width:640px)').matches;
    if(!mobile){
      device.style.transform = '';
      device.style.transformOrigin = '';
      vp.style.width = '';
      vp.style.height = '';
      return;
    }
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / 375, vh / 812);
    device.style.transformOrigin = 'top left';
    device.style.transform = 'scale(' + scale + ')';
    vp.style.width = (375 * scale) + 'px';
    vp.style.height = (812 * scale) + 'px';
  }
  window.addEventListener('resize', fitDevice);
  window.addEventListener('orientationchange', fitDevice);
  fitDevice();
</script>
</body>
</html>
