<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Share your preferences — Shipt onboarding prototype</title>
<style>
  /* ---- Design tokens from Figma (Shipt) ---- */
  :root{
    --primary:#212121;
    --content-primary:#302638;
    --title-primary:#212121;
    --secondary:rgba(33,33,33,0.8);
    --chip-border:#cac9cc;
    --chip-text:#25123a;
    --progress-empty:#cac9cc;
    --progress-fill:linear-gradient(-90deg, rgb(29,164,87) 0%, rgb(36,205,108) 47.4%);
    --font: "Euclid Circular A", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font);
    background:#e9eaee;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;gap:14px;padding:24px 0;
  }

  /* ---- Phone frame ---- */
  .device{
    position:relative;
    width:375px;height:812px;
    background:#fff;border-radius:44px;
    box-shadow:0 0 0 12px #111, 0 24px 60px rgba(0,0,0,.35);
    overflow:hidden;
  }
  .screen{position:absolute;inset:0;overflow:hidden;}

  /* ---- Home screen: fixed header + scrollable content (Frame 2147260108) + fixed tab bar ---- */
  #home{cursor:default;background:#fff;}
  #home img{display:block;}
  #home .home-header{position:absolute;top:0;left:0;width:375px;height:315px;z-index:3;}
  #home .home-tabbar{position:absolute;top:732px;left:0;width:375px;height:80px;z-index:3;}
  #home .home-scroll{
    position:absolute;top:315px;left:0;width:375px;height:417px;
    overflow-y:auto;overflow-x:hidden;z-index:1;-webkit-overflow-scrolling:touch;
  }
  #home .home-scroll img{width:375px;}
  /* transparent hotspot over the real "Set preferences" button inside scroll content */
  .launch-hint{
    position:absolute;left:70px;top:638px;width:118px;height:36px;
    background:transparent;border:none;border-radius:400px;cursor:pointer;z-index:2;
  }

  /* ---- Dialog (full-screen white) ---- */
  .dialog{
    position:absolute;inset:0;background:#fff;z-index:10;
    display:none;flex-direction:column;align-items:flex-end;
    padding-bottom:32px;
    animation:slideIn .28s cubic-bezier(.2,.7,.3,1);
  }
  .dialog.active{display:flex;}
  @keyframes slideIn{from{transform:translateY(14px);opacity:0;}to{transform:none;opacity:1;}}

  /* header */
  .header{
    display:flex;align-items:flex-start;justify-content:space-between;
    width:100%;padding:48px 0 16px 8px;flex:0 0 auto;
  }
  .title-container{flex:1 1 0;min-width:0;padding:4px 0 4px 8px;}
  .title-container h1{
    margin:0;font-weight:600;font-size:24px;line-height:30px;
    color:var(--title-primary);letter-spacing:0;
  }
  .icon-btn{
    width:40px;height:40px;border:2px solid transparent;background:transparent;
    border-radius:400px;display:flex;align-items:center;justify-content:center;
    padding:10px;cursor:pointer;color:#212121;flex:0 0 auto;
  }
  .icon-btn svg{width:20px;height:20px;display:block;}
  .icon-btn:active{background:rgba(33,33,33,.06);}
  .trailing{display:flex;align-items:center;justify-content:flex-end;min-height:38px;padding-right:4px;}

  /* content */
  .content{
    flex:1 1 0;min-height:0;width:100%;
    overflow-y:auto;overflow-x:clip;
    padding:0 16px;display:flex;flex-direction:column;align-items:flex-start;gap:12px;
  }
  .pref-form{display:flex;flex-direction:column;gap:24px;width:100%;}

  /* intro hero */
  .intro{display:flex;flex-direction:column;gap:24px;width:100%;}
  .intro .hero{
    width:100%;height:379px;border-radius:16px;background:#d9d9d9;
    object-fit:cover;display:block;
  }
  .intro p{
    margin:0;font-weight:400;font-size:16px;line-height:20px;color:var(--content-primary);
  }

  /* top bar + progress */
  .topbar{display:flex;align-items:center;justify-content:flex-end;padding:0 8px;width:100%;height:40px;}
  .topbar span{font-weight:500;font-size:12px;line-height:18px;color:var(--secondary);}
  .progress{display:flex;gap:4px;align-items:center;width:100%;}
  .progress .seg{flex:1 1 0;min-width:0;height:6px;border-radius:69px;background:var(--progress-empty);}
  .progress .seg.fill{background:var(--progress-fill);}

  /* body text */
  .form-heading{display:flex;flex-direction:column;gap:8px;width:100%;}
  .form-heading .q{margin:0;font-weight:600;font-size:24px;line-height:30px;color:var(--content-primary);}
  .form-heading .sub{margin:0;font-weight:400;font-size:16px;line-height:20px;color:var(--content-primary);}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;width:100%;align-content:flex-start;}
  .chip{
    height:32px;border:2px solid var(--chip-border);background:transparent;
    border-radius:400px;padding:8px 16px;display:inline-flex;align-items:center;justify-content:center;
    font-family:var(--font);font-weight:600;font-size:14px;line-height:16px;color:var(--chip-text);
    white-space:nowrap;cursor:pointer;transition:background .12s,border-color .12s,color .12s;
  }
  .chip:active{transform:scale(.97);}
  .chip.selected{background:var(--primary);border-color:var(--primary);color:#fff;}

  /* footer */
  .footer{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:24px 16px 0;overflow:clip;flex:0 0 auto;
  }
  .btn{
    width:100%;border-radius:400px;border:2px solid transparent;
    padding:16px 32px;font-family:var(--font);font-weight:600;font-size:14px;
    letter-spacing:.5px;text-align:center;cursor:pointer;line-height:1.429;
  }
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:active{background:#000;}
  .btn-ghost{background:transparent;color:#212121;}
  .btn-ghost:active{background:rgba(33,33,33,.06);}

  /* toast (exact Figma component 735:185688) */
  .toast{
    position:absolute;left:16px;top:665px;width:343px;
    background:#212121;border:1px solid rgba(33,33,33,0.1);
    border-radius:8px;overflow:clip;
    box-shadow:0 0 4px 0 rgba(0,0,0,.1), 0 6px 6px -4px rgba(0,0,0,.2);
    opacity:0;transform:translateY(12px);pointer-events:none;transition:.3s;z-index:20;
  }
  .toast.show{opacity:1;transform:none;}
  .toast .toast-content{display:flex;gap:12px;align-items:center;padding:8px 12px;width:100%;}
  .toast .icon{width:20px;height:20px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .toast .icon svg{width:16.67px;height:16.67px;display:block;}
  .toast .txt{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:2px;align-items:flex-start;}
  .toast .txt .t1{font-family:var(--font);font-weight:600;font-size:16px;line-height:20px;color:#fff;}
  .toast .txt .t2{font-family:var(--font);font-weight:400;font-size:14px;line-height:18px;color:#fff;}
  .toast .close{width:20px;height:20px;flex:0 0 auto;color:#fff;background:transparent;border:none;padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .toast .close svg{width:14px;height:14px;display:block;}

  .caption{color:#6a6a72;font-size:13px;font-family:var(--font);text-align:center;max-width:375px;}
  .caption b{color:#333;}
  .reset{background:none;border:none;color:#1da457;font-weight:600;cursor:pointer;font-size:13px;font-family:var(--font);}
</style>
</head>
<body>

  <div class="device" id="device">

    <!-- HOME -->
    <section class="screen" id="home">
      <img class="home-header" src="assets/home-header.png" alt="" />
      <div class="home-scroll" id="homeScroll">
        <img id="homeContentImg" src="assets/home-content.png" alt="Home content" />
        <button class="launch-hint" id="launchHint" aria-label="Set preferences" onclick="openFlow()"></button>
      </div>
      <img class="home-tabbar" src="assets/home-tabbar.png" alt="" />
    </section>

    <!-- INTRO -->
    <section class="dialog" id="intro">
      <div class="header">
        <div class="title-container"><h1>Share your preferences</h1></div>
        <div class="trailing">
          <button class="icon-btn" aria-label="Close" onclick="goHome()">
            <svg viewBox="0 0 20 20" fill="none"><path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="content">
        <div class="intro">
          <img class="hero" src="assets/intro-hero.png" alt="People sharing a Shipt bag at a party" />
          <p>Answer 3 quick questions to help us better tailor your shopping experience.</p>
        </div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" onclick="goStep(1)">Start</button>
        <button class="btn btn-ghost" onclick="goHome()">Not now</button>
      </div>
    </section>

    <!-- STEP 1 / 2 / 3 share one template, generated by JS -->
    <section class="dialog" id="step">
      <div class="header">
        <button class="icon-btn" aria-label="Back" onclick="stepBack()">
          <svg viewBox="0 0 20 20" fill="none"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="trailing">
          <button class="icon-btn" aria-label="Close" onclick="goHome()">
            <svg viewBox="0 0 20 20" fill="none"><path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="content">
        <div class="pref-form">
          <div style="display:flex;flex-direction:column;width:100%;">
            <div class="topbar"><span id="stepLabel">Step 1 of 3</span></div>
            <div class="progress" id="progress">
              <div class="seg"></div><div class="seg"></div><div class="seg"></div>
            </div>
          </div>
          <div class="form-heading">
            <p class="q" id="stepQ"></p>
            <p class="sub">Select all that apply.</p>
          </div>
          <div class="chips" id="chips"></div>
        </div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" id="primaryBtn" onclick="stepNext()">Continue</button>
        <button class="btn btn-ghost" onclick="stepNext()">Skip</button>
      </div>
    </section>

    <!-- TOAST (exact Figma component) -->
    <div class="toast" id="toast">
      <div class="toast-content">
        <span class="icon">
          <svg viewBox="0 0 16.6667 16.6667" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M8.33333 16.6667C12.9357 16.6667 16.6667 12.9357 16.6667 8.33333C16.6667 3.73096 12.9357 0 8.33333 0C3.73096 0 0 3.73096 0 8.33333C0 12.9357 3.73096 16.6667 8.33333 16.6667ZM12.8406 6.72976C13.1823 6.38805 13.1823 5.83403 12.8406 5.49232C12.4989 5.15062 11.9449 5.15062 11.6032 5.49232L7.22188 9.87361L5.61838 8.2701C5.27667 7.92839 4.72265 7.92839 4.38094 8.2701C4.03923 8.61181 4.03923 9.16583 4.38094 9.50754L6.60316 11.7298C6.94487 12.0715 7.49889 12.0715 7.8406 11.7298L12.8406 6.72976Z" fill="#2FAD32"/></svg>
        </span>
        <span class="txt">
          <span class="t1">Preferences saved</span>
          <span class="t2">Changes can be made in your Account page</span>
        </span>
        <button class="close" aria-label="Dismiss" onclick="hideToast()">
          <svg viewBox="0 0 20 20" fill="none"><path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="caption">
    Exact Shipt <b>“Share your preferences”</b> onboarding flow from Figma. &nbsp;·&nbsp;
    <button class="reset" onclick="goHome()">Reset to home</button>
  </div>

<script>
  const STEPS = [
    {
      label:"Step 1 of 3",
      q:"Who do you usually shop for?",
      primary:"Continue",
      chips:["Myself","Partner","Baby","Kids","Teens","Roommates","Pets"]
    },
    {
      label:"Step 2 of 3",
      q:"Which categories are you interested in?",
      primary:"Continue",
      chips:["Groceries","Alcohol","Pet Supplies","Gifts & Party","Beauty","Home Decor","Home Improvement","Household Essentials","Personal Care"]
    },
    {
      label:"Step 3 of 3",
      q:"What are your dietary preferences?",
      primary:"Finish",
      chips:["AHA Heart Healthy","Gluten Free","Low sodium","No Added Sugar","Non-GMO","Organic","Soy-free","Sugar-free","Wheat-free","Whole Grain","Atkins","Keto","Kosher","Mediterranean","Paleo","Pescatarian","Vegan","Vegetarian"]
    }
  ];

  // selection state per step
  const selected = [new Set(), new Set(), new Set()];
  let current = 0; // 1..3 when in a step

  function show(id){
    document.querySelectorAll('.dialog').forEach(d=>d.classList.remove('active'));
    if(id) document.getElementById(id).classList.add('active');
  }

  function openFlow(){ show('intro'); }

  // Swap home content between initial (promo banner + hotspot) and completed (no banner) states
  function setHomeState(done){
    const img = document.getElementById('homeContentImg');
    const hint = document.getElementById('launchHint');
    const scroll = document.getElementById('homeScroll');
    img.src = done ? 'assets/done-content.png' : 'assets/home-content.png';
    hint.style.display = done ? 'none' : 'block';
    scroll.scrollTop = 0;
  }

  function goHome(){
    show(null);
    hideToast();
    setHomeState(false);
  }

  function goStep(n){
    current = n;
    const s = STEPS[n-1];
    document.getElementById('stepLabel').textContent = s.label;
    document.getElementById('stepQ').textContent = s.q;
    document.getElementById('primaryBtn').textContent = s.primary;

    // progress
    const prog = document.getElementById('progress');
    [...prog.children].forEach((seg,i)=>{
      seg.className = 'seg' + (i < n ? ' fill' : '');
    });

    // chips
    const wrap = document.getElementById('chips');
    wrap.innerHTML = '';
    s.chips.forEach(label=>{
      const b = document.createElement('button');
      b.className = 'chip' + (selected[n-1].has(label) ? ' selected' : '');
      b.textContent = label;
      b.onclick = ()=>{
        if(selected[n-1].has(label)){ selected[n-1].delete(label); b.classList.remove('selected'); }
        else { selected[n-1].add(label); b.classList.add('selected'); }
      };
      wrap.appendChild(b);
    });

    show('step');
    document.querySelector('#step .content').scrollTop = 0;
  }

  function stepBack(){
    if(current <= 1){ show('intro'); }
    else { goStep(current - 1); }
  }

  function stepNext(){
    if(current < 3){ goStep(current + 1); }
    else { finishFlow(); }
  }

  function finishFlow(){
    show(null);
    setHomeState(true);       // completed home: promo banner removed (exact 735:184716 design)
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(hideToast, 4000);
  }

  function hideToast(){
    document.getElementById('toast').classList.remove('show');
  }
</script>
</body>
</html>
